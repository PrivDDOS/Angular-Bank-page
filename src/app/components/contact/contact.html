<div id="container">

    <header id="header">
        <div class="nav-container">

            <div class="nav-left">
                <div class="img">
                    <img src="assets/images/logo-dark.svg" alt="logo">
                </div>
            </div>

            <div class="nav-mid">
                <div class="nav-link">
                    <button 
                    routerLink="/"
                    type="button"
                    class="link-btn"
                    >
                    Home
                    </button>
                </div>
                <div class="nav-link">
                    <button
                    routerLink="/about"
                    type="button"
                    class="link-btn"
                    >
                    About
                </button>
                </div>
                <div class="nav-link">
                    <button
                    routerLink="/contact"
                    type="button"
                    class="link-btn"
                    >
                    Contact
                    </button>
                </div>
                <div class="nav-link">
                    <button
                    routerLink="/blog"
                    type="button"
                    class="link-btn"
                    >
                    Blog
                </button>
                </div>
                <div class="nav-link">
                    <button
                    routerLink="/careers"
                    type="button"
                    class="link-btn"
                    >
                    Careers
                    </button>
                </div>
            </div>

            <div class="nav-right">
                <button class="btn">
                    Request invite
                </button>
                <button class="mobile-menu">
                    <img src="/assets/images/icon-hamburger.svg" alt="mobile-menu">
                </button>
            </div>
        </div>
    </header>

    <main id="main">

        <div class="contact">
            <div class="contact-container">
                <h1>Contact Us</h1>
                <h3>Feel interested in our Bank? Contact us now!!!</h3>
                <a href=".form">&#x21E9;</a>
            </div>
        </div>

        <div class="option">

            <div class="option-text">
                <h1>Choose your contact method!</h1>
            </div>

            <div class="card-container">

                <div class="card option-1">
                    <h1>📧 Email</h1>
                    <p>support@digitplbank.com</p>
                </div>
    
                <div class="card option-2">
                    <h1>📞 Phone</h1>
                    <p>+84 xxx xxx xxx</p>
                </div>
    
                <div class="card option-3">
                    <h1>💬 Live Chat</h1>
                    <p>Available 24/7</p>
                </div>
    
                <div class="card option-4">
                    <h1>📍 Office</h1>
                    <p>Hanoi, Vietnam</p>
                </div>

            </div>

        </div>

        <div class="form">
            
            <form action="/submit-contact" method="post">
                <label for="name">Name</label><br>
                <input id="name" name="name" type="text" placeholder="Enter your Name"><br>

                <label for="email">Email</label><br>
                <input id="email" name="email" type="email" placeholder="Enter your Email"><br>

                <label for="message">Message</label><br>
                <textarea id="message" name="message" placeholder="Send Message"></textarea><br>

                <input type="submit" value="Submit">
            </form>

        </div>

    </main>

    <footer id="footer">

        <div class="footer-left">

            <div class="left">
                <div class="top-img">
                    <img src="/assets/images/logo-light.svg" alt="logo">
                </div>
                <div class="bottom-img">
                    <div class="social-icon">
                        <img src="/assets/images/icon-facebook.svg" alt="facebook">
                    </div>
                    <div class="social-icon">
                        <img src="/assets/images/icon-youtube.svg" alt="youtube">
                    </div>
                    <div class="social-icon">
                        <img src="/assets/images/icon-twitter.svg" alt="twitter">
                    </div>
                    <div class="social-icon">
                        <img src="/assets/images/icon-pinterest.svg" alt="pinterest">
                    </div>
                    <div class="social-icon">
                        <img src="/assets/images/icon-instagram.svg" alt="instagram">
                    </div>
                </div>
            </div>

            <div class="mid">
                <div class="btn">
                    <button>Abous Us</button>
                </div>
                <div class="btn">
                    <button>Contact</button>
                </div>
                <div class="btn">
                    <button>Blog</button>
                </div>
            </div>

            <div class="right">
                <div class="btn">
                    <button>Careers</button>
                </div>
                <div class="btn">
                    <button>Support</button>
                </div>
                <div class="btn">
                    <button>Privacy and Policy</button>
                </div>
            </div>

        </div>

        <div class="footer-right">
            
            <div class="btn">
                <button>
                    Request invite
                </button>
            </div>

            <div class="trademark">
                <h4 class="copyright">
                    ⓒ Digitalbank. All Rights Reserved
                </h4>
            </div>
        </div>

    </footer>

</div>
